<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:tiles="http://www.thymeleaf.org" lang="es">
  <head>
    <title tiles:fragment="title">ORB API LOGIN PAGE</title>
  </head>
  <body>
    <div tiles:fragment="content">
      <form name="f" th:action="@{/}" method="post">
        <fieldset>
          <legend>Please Login</legend>
          <div th:if="${param.error}" class="alert alert-error">
            Invalid username and password.
          </div>
          <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out.
          </div>
          
          <h1>ORB API LOGIN PAGE</h1>

          <label for="username">Username</label>
          <input type="text" id="username" name="username" />
          <label for="password">Password</label>
          <input type="password" id="password" name="password" />
          <div class="form-actions">
            <button type="submit" class="btn">Log in</button>
          </div>
        </fieldset>
      </form>

      <div>
        <a th:href="@{/oauth2/authorization/google}">Login with Google</a>
      </div>

      <div>
        <a th:href="@{/oauth2/authorization/microsoft}">Login with Microsoft</a>
      </div>
    </div>
  </body>
</html>
