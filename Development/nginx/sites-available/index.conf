# Default server block to catch requests without a matching server name
server {
    listen 8080 default_server;
    server_name _;

    return 404;
}

# HTTP server block with redirect to HTTPS
server {
    listen 8080;
    server_name api.orbfin.development;

    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name www.api.orbfin.development api.orbfin.development;

   location / {
        proxy_pass http://orb_api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    include snippets/self-signed.conf;
    include snippets/ssl-params.conf;

    # Enable HSTS for 1 hour with preload (for development, adjust as needed)
    add_header Strict-Transport-Security "max-age=3600; includeSubDomains; preload" always;
}
